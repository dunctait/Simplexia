<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simplex Islands</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="map-panel" aria-label="Generated island map">
      <div class="topbar hud">
        <div>
          <h1>Simplex Islands</h1>
          <p id="summary">Generating island...</p>
        </div>
        <div class="actions">
          <button id="randomize" type="button" class="primary-action">Randomize</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </div>
      <div id="globe-stage" aria-label="3D procedural planet"></div>
      <div id="generation-loading" class="loading-overlay" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span>Generating</span>
      </div>
      <div class="legend" id="legend" aria-label="Biome legend"></div>
    </section>

    <aside class="control-panel" id="controls">
      <details class="advanced-panel">
        <summary>Advanced Settings</summary>
        <div class="actions">
          <button id="copy-export" type="button">Copy Export</button>
        </div>
        <label class="field">
          <span>Biome Set</span>
          <select id="biomePreset"></select>
        </label>
        <div class="control-grid">
          <label class="field"><span>Resolution <output id="resolutionOut"></output></span><input id="resolution" type="range" min="64" max="384" step="1"></label>
          <label class="field"><span>Landmass Frequency <output id="landmassFrequencyOut"></output></span><input id="landmassFrequency" type="range" min="0.45" max="2.8" step="0.05"></label>
          <label class="field"><span>Surface Detail <output id="surfaceScaleOut"></output></span><input id="surfaceScale" type="range" min="1" max="9" step="0.1"></label>
          <label class="field"><span>Octaves <output id="octavesOut"></output></span><input id="octaves" type="range" min="1" max="8" step="1"></label>
          <label class="field"><span>Roughness <output id="roughnessOut"></output></span><input id="roughness" type="range" min="0.1" max="1" step="0.01"></label>
          <label class="field"><span>Sea Level <output id="seaLevelOut"></output></span><input id="seaLevel" type="range" min="0.05" max="0.55" step="0.01"></label>
          <label class="field"><span>Cloud Coverage <output id="cloudCoverageOut"></output></span><input id="cloudCoverage" type="range" min="0" max="1" step="0.01"></label>
          <label class="field"><span>Beach Line <output id="beachLevelOut"></output></span><input id="beachLevel" type="range" min="0.08" max="0.7" step="0.01"></label>
          <label class="field"><span>Mountain Line <output id="mountainLevelOut"></output></span><input id="mountainLevel" type="range" min="0.3" max="0.95" step="0.01"></label>
          <label class="field"><span>Seed <output id="seedOut"></output></span><input id="seed" type="range" min="0" max="255" step="1"></label>
        </div>
        <div class="toggle-grid">
          <label class="toggle-field"><input id="playfulPalette" type="checkbox"><span>Playful Colors</span></label>
          <label class="toggle-field"><input id="showRings" type="checkbox"><span>Saturn Rings</span></label>
          <label class="toggle-field"><input id="showMoons" type="checkbox"><span>Moons</span></label>
          <label class="toggle-field"><input id="showFish" type="checkbox"><span>Sea Fish</span></label>
        </div>
        <section class="saves" aria-label="Saved generations">
          <div class="save-row">
            <input id="saveName" type="text" maxlength="40" placeholder="Generation name">
            <button id="save" type="button">Save</button>
          </div>
          <select id="savedList" size="5" aria-label="Saved generations"></select>
          <div class="actions">
            <button id="load" type="button">Load</button>
            <button id="delete" type="button">Delete</button>
          </div>
        </section>
      </details>
    </aside>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="src/simplex-noise.js"></script>
  <script src="src/generator.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/renderer.js"></script>
  <script src="vendor/globe-bundle.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/bootstrap.js"></script>
</body>
</html>
